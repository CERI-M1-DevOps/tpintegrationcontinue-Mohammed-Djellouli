name: Java CI with Maven - Test and package

on:
  pull_request:
    branches:
      - main

jobs:
  TestAndPackages:
    name : TestAndPackages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Corretto)
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'

      - name: Build with Maven (tests + package)
        run: mvn -B package
