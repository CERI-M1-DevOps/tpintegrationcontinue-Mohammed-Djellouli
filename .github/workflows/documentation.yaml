name: Generate & Publish Javadoc

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write

jobs:
  docs:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Set up JDK 21 (Corretto)
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'

      - name: Build Javadoc
        run: mvn -B -DskipTests javadoc:javadoc

      # Locate the apidocs directory (works for single or multi-module builds)
      - name: Locate apidocs
        id: locate_apidocs
        shell: bash
        run: |
          set -e
          APIDOCS_DIR=$(find . -type d -name apidocs -print -quit)
          if [ -z "$APIDOCS_DIR" ]; then
            echo "No 'apidocs' directory found after javadoc build." >&2
            exit 1
          fi
          echo "Found apidocs at: $APIDOCS_DIR"
          echo "apidocs_dir=$APIDOCS_DIR" >> "$GITHUB_OUTPUT"

      - name: Deploy to GitHub Pages (branch mode)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.locate_apidocs.outputs.apidocs_dir }}
          force_orphan: true
